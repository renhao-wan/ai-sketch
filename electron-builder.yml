appId: ai-sketch
productName: AI Sketch
copyright: Copyright © 2024 AI Sketch

publish:
  provider: github
  owner: renhao-wan
  repo: ai-sketch

directories:
  output: dist
  buildResources: electron/resources

files:
  - "**/*"
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.map"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/.cache/**"
  - "!.next/**"
  - ".next/**"
  - "!.next/cache/**"
  - "!electron/**"
  - "app/**"
  - "lib/**"
  - "dist-electron/**"
  - "package.json"

extraResources:
  - from: "data"
    to: "data"
    filter: ["**/*"]
  - from: "assets/tesseract"
    to: "tesseract"
    filter: ["**/*.traineddata"]

# Windows 配置
win:
  target:
    - target: nsis
      arch: [x64]
  icon: electron/resources/icon.ico
  requestedExecutionLevel: asInvoker

nsis:
  artifactName: "${productName}-Setup-${version}.${ext}"
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: electron/resources/icon.ico
  uninstallerIcon: electron/resources/icon.ico
  installerHeaderIcon: electron/resources/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AI Sketch
  # 卸载时询问是否删除数据
  include: electron/resources/uninstaller.nsh

# macOS 配置
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: electron/resources/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/resources/entitlements.mac.plist
  entitlementsInherit: electron/resources/entitlements.mac.plist

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Linux 配置
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: electron/resources/icon.png
  category: Development
  desktop:
    Name: AI Sketch
    Comment: AI 驱动的图表创作平台
    Terminal: false
    Type: Application
