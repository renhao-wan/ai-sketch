name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Compile Electron TypeScript
        run: npx tsc --project electron/tsconfig.json

      - name: Create data directory
        run: mkdir -p data

      - name: Build Electron app
        run: npx electron-builder --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Find Windows artifacts
        id: find-windows
        shell: bash
        run: |
          INSTALLER=$(find dist -name "*.exe" -type f | head -1)
          BLOCKMAP=$(find dist -name "*.exe.blockmap" -type f | head -1)
          echo "installer=$INSTALLER" >> $GITHUB_OUTPUT
          echo "installer_name=$(basename "$INSTALLER")" >> $GITHUB_OUTPUT
          echo "blockmap=$BLOCKMAP" >> $GITHUB_OUTPUT
          echo "blockmap_name=$(basename "$BLOCKMAP")" >> $GITHUB_OUTPUT

      - name: Upload Windows installer to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find-windows.outputs.installer }}
          asset_name: ${{ steps.find-windows.outputs.installer_name }}
          asset_content_type: application/octet-stream

      - name: Upload Windows blockmap to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find-windows.outputs.blockmap }}
          asset_name: ${{ steps.find-windows.outputs.blockmap_name }}
          asset_content_type: application/octet-stream

      - name: Upload Windows latest.yml to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/latest.yml
          asset_name: latest.yml
          asset_content_type: text/yaml

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Compile Electron TypeScript
        run: npx tsc --project electron/tsconfig.json

      - name: Create data directory
        run: mkdir -p data

      - name: Build Electron app
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Find macOS artifacts
        id: find-macos
        run: |
          INSTALLER=$(find dist -name "*.dmg" -type f | head -1)
          DMG_BLOCKMAP=$(find dist -name "*.dmg.blockmap" -type f | head -1)
          ZIP=$(find dist -name "*-mac.zip" -type f | head -1)
          ZIP_BLOCKMAP=$(find dist -name "*-mac.zip.blockmap" -type f | head -1)
          echo "installer=$INSTALLER" >> $GITHUB_OUTPUT
          echo "installer_name=$(basename "$INSTALLER")" >> $GITHUB_OUTPUT
          echo "dmg_blockmap=$DMG_BLOCKMAP" >> $GITHUB_OUTPUT
          echo "dmg_blockmap_name=$(basename "$DMG_BLOCKMAP")" >> $GITHUB_OUTPUT
          echo "zip=$ZIP" >> $GITHUB_OUTPUT
          echo "zip_name=$(basename "$ZIP")" >> $GITHUB_OUTPUT
          echo "zip_blockmap=$ZIP_BLOCKMAP" >> $GITHUB_OUTPUT
          echo "zip_blockmap_name=$(basename "$ZIP_BLOCKMAP")" >> $GITHUB_OUTPUT

      - name: Upload macOS DMG to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find-macos.outputs.installer }}
          asset_name: ${{ steps.find-macos.outputs.installer_name }}
          asset_content_type: application/octet-stream

      - name: Upload macOS DMG blockmap to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find-macos.outputs.dmg_blockmap }}
          asset_name: ${{ steps.find-macos.outputs.dmg_blockmap_name }}
          asset_content_type: application/octet-stream

      - name: Upload macOS ZIP to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find-macos.outputs.zip }}
          asset_name: ${{ steps.find-macos.outputs.zip_name }}
          asset_content_type: application/octet-stream

      - name: Upload macOS ZIP blockmap to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find-macos.outputs.zip_blockmap }}
          asset_name: ${{ steps.find-macos.outputs.zip_blockmap_name }}
          asset_content_type: application/octet-stream

      - name: Upload macOS latest-mac.yml to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/latest-mac.yml
          asset_name: latest-mac.yml
          asset_content_type: text/yaml

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Compile Electron TypeScript
        run: npx tsc --project electron/tsconfig.json

      - name: Create data directory
        run: mkdir -p data

      - name: Build Electron app
        run: npx electron-builder --linux AppImage --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Find Linux artifacts
        id: find-linux
        run: |
          INSTALLER=$(find dist -name "*.AppImage" -type f | head -1)
          BLOCKMAP=$(find dist -name "*.AppImage.blockmap" -type f | head -1)
          echo "installer=$INSTALLER" >> $GITHUB_OUTPUT
          echo "installer_name=$(basename "$INSTALLER")" >> $GITHUB_OUTPUT
          echo "blockmap=$BLOCKMAP" >> $GITHUB_OUTPUT
          echo "blockmap_name=$(basename "$BLOCKMAP")" >> $GITHUB_OUTPUT

      - name: Upload Linux AppImage to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find-linux.outputs.installer }}
          asset_name: ${{ steps.find-linux.outputs.installer_name }}
          asset_content_type: application/octet-stream

      - name: Upload Linux blockmap to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find-linux.outputs.blockmap }}
          asset_name: ${{ steps.find-linux.outputs.blockmap_name }}
          asset_content_type: application/octet-stream

      - name: Upload Linux latest-linux.yml to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/latest-linux.yml
          asset_name: latest-linux.yml
          asset_content_type: text/yaml
