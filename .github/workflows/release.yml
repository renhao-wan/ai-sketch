name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Compile Electron TypeScript
        run: npx tsc --project electron/tsconfig.json

      - name: Create data directory
        run: mkdir -p data

      - name: Build Electron app
        run: npx electron-builder --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: List dist directory
        shell: bash
        run: ls -la dist/

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Upload Windows installer to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/AI-Sketch-Setup-${{ steps.version.outputs.version }}.exe
          asset_name: AI-Sketch-Setup-${{ steps.version.outputs.version }}.exe
          asset_content_type: application/octet-stream

      - name: Upload Windows blockmap to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/AI-Sketch-Setup-${{ steps.version.outputs.version }}.exe.blockmap
          asset_name: AI-Sketch-Setup-${{ steps.version.outputs.version }}.exe.blockmap
          asset_content_type: application/octet-stream

      - name: Upload Windows latest.yml to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/latest.yml
          asset_name: latest.yml
          asset_content_type: text/yaml

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Compile Electron TypeScript
        run: npx tsc --project electron/tsconfig.json

      - name: Create data directory
        run: mkdir -p data

      - name: Build Electron app
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: List dist directory
        run: ls -la dist/

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Upload macOS DMG to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/AI-Sketch-${{ steps.version.outputs.version }}-arm64-mac.dmg
          asset_name: AI-Sketch-${{ steps.version.outputs.version }}-arm64-mac.dmg
          asset_content_type: application/octet-stream

      - name: Upload macOS DMG blockmap to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/AI-Sketch-${{ steps.version.outputs.version }}-arm64-mac.dmg.blockmap
          asset_name: AI-Sketch-${{ steps.version.outputs.version }}-arm64-mac.dmg.blockmap
          asset_content_type: application/octet-stream

      - name: Upload macOS ZIP to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/AI-Sketch-${{ steps.version.outputs.version }}-arm64-mac.zip
          asset_name: AI-Sketch-${{ steps.version.outputs.version }}-arm64-mac.zip
          asset_content_type: application/octet-stream

      - name: Upload macOS ZIP blockmap to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/AI-Sketch-${{ steps.version.outputs.version }}-arm64-mac.zip.blockmap
          asset_name: AI-Sketch-${{ steps.version.outputs.version }}-arm64-mac.zip.blockmap
          asset_content_type: application/octet-stream

      - name: Upload macOS latest-mac.yml to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/latest-mac.yml
          asset_name: latest-mac.yml
          asset_content_type: text/yaml

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Compile Electron TypeScript
        run: npx tsc --project electron/tsconfig.json

      - name: Create data directory
        run: mkdir -p data

      - name: Build Electron app
        run: npx electron-builder --linux AppImage --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: List dist directory
        run: ls -la dist/

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Upload Linux AppImage to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/AI-Sketch-${{ steps.version.outputs.version }}.AppImage
          asset_name: AI-Sketch-${{ steps.version.outputs.version }}.AppImage
          asset_content_type: application/octet-stream

      - name: Upload Linux blockmap to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/AI-Sketch-${{ steps.version.outputs.version }}.AppImage.blockmap
          asset_name: AI-Sketch-${{ steps.version.outputs.version }}.AppImage.blockmap
          asset_content_type: application/octet-stream

      - name: Upload Linux latest-linux.yml to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/latest-linux.yml
          asset_name: latest-linux.yml
          asset_content_type: text/yaml
