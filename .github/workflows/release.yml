name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Compile Electron TypeScript
        run: npx tsc --project electron/tsconfig.json

      - name: Create data directory
        run: mkdir -p data

      - name: Build Electron app
        run: npx electron-builder --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Find Windows installer
        id: find-windows
        shell: bash
        run: |
          INSTALLER=$(find dist -name "*.exe" -type f | head -1)
          echo "installer=$INSTALLER" >> $GITHUB_OUTPUT
          echo "filename=$(basename "$INSTALLER")" >> $GITHUB_OUTPUT

      - name: Upload Windows installer to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find-windows.outputs.installer }}
          asset_name: ${{ steps.find-windows.outputs.filename }}
          asset_content_type: application/octet-stream

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Compile Electron TypeScript
        run: npx tsc --project electron/tsconfig.json

      - name: Create data directory
        run: mkdir -p data

      - name: Build Electron app
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Find macOS installer
        id: find-macos
        run: |
          INSTALLER=$(find dist -name "*.dmg" -type f | head -1)
          echo "installer=$INSTALLER" >> $GITHUB_OUTPUT
          echo "filename=$(basename "$INSTALLER")" >> $GITHUB_OUTPUT

      - name: Upload macOS installer to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find-macos.outputs.installer }}
          asset_name: ${{ steps.find-macos.outputs.filename }}
          asset_content_type: application/octet-stream

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Compile Electron TypeScript
        run: npx tsc --project electron/tsconfig.json

      - name: Create data directory
        run: mkdir -p data

      - name: Build Electron app
        run: npx electron-builder --linux AppImage --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Find Linux installer
        id: find-linux
        run: |
          INSTALLER=$(find dist -name "*.AppImage" -type f | head -1)
          echo "installer=$INSTALLER" >> $GITHUB_OUTPUT
          echo "filename=$(basename "$INSTALLER")" >> $GITHUB_OUTPUT

      - name: Upload Linux installer to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find-linux.outputs.installer }}
          asset_name: ${{ steps.find-linux.outputs.filename }}
          asset_content_type: application/octet-stream
